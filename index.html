<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="description" content="簡約清爽海洋風打地鼠網頁遊戲，支援單人、Firebase 多人房間、20 級難度、多主題、音效與排行榜。" />
  <title>海洋打地鼠 | Firebase 多人版</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-theme="ocean">
  <div class="bg-bubbles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <main class="app-shell">
    <section class="hero card" id="startPanel">
      <div class="hero-copy">
        <p class="eyebrow">Ocean Whack-a-Mole</p>
        <h1>海洋打地鼠</h1>
        <p class="subtitle">單人練反應，多人開房間一起比手速。支援電腦、平板、手機觸控。</p>
        <div class="hero-actions">
          <button class="primary" id="singleQuickStart">單人快速開始</button>
          <button class="ghost" id="scrollToMultiplayer">多人房間</button>
        </div>
      </div>
      <div class="hero-mascot" aria-hidden="true">
        <div class="wave-orb">🐹</div>
        <div class="mini-badge">20 級難度</div>
      </div>
    </section>

    <section class="grid-layout">
      <aside class="side-panel card">
        <h2>遊戲設定</h2>

        <label class="field">
          <span>玩家暱稱</span>
          <input id="playerName" type="text" maxlength="16" autocomplete="nickname" placeholder="例如：小海豚" />
        </label>

        <label class="field">
          <span>難易度：<strong id="levelText">1</strong> / 20</span>
          <input id="levelRange" type="range" min="1" max="20" value="1" />
          <small id="levelHint">輕鬆暖身，地鼠速度較慢。</small>
        </label>

        <label class="field">
          <span>遊戲秒數</span>
          <select id="durationSelect">
            <option value="30">30 秒</option>
            <option value="45" selected>45 秒</option>
            <option value="60">60 秒</option>
            <option value="90">90 秒</option>
          </select>
        </label>

        <label class="field">
          <span>主題風格</span>
          <select id="themeSelect"></select>
        </label>

        <div class="toggle-row">
          <label class="switch">
            <input id="soundToggle" type="checkbox" checked />
            <span></span>
          </label>
          <span>音效</span>
        </div>

        <div class="mode-card" id="multiplayerPanel">
          <h3>多人 Firebase 房間</h3>
          <p>建立房間後把房號分享給朋友，每個人會獨立計分。</p>
          <div class="button-stack">
            <button id="createRoomBtn" class="secondary">建立房間</button>
            <div class="join-row">
              <input id="roomCodeInput" type="text" maxlength="6" placeholder="輸入房號" />
              <button id="joinRoomBtn" class="secondary">加入</button>
            </div>
          </div>
          <p class="notice" id="firebaseNotice">多人模式需要先設定 Firebase。</p>
        </div>
      </aside>

      <section class="game-card card">
        <div class="topbar">
          <div>
            <p class="label">模式</p>
            <strong id="modeLabel">單人</strong>
          </div>
          <div>
            <p class="label">房號</p>
            <strong id="roomCodeLabel">—</strong>
          </div>
          <div>
            <p class="label">分數</p>
            <strong id="scoreLabel">0</strong>
          </div>
          <div>
            <p class="label">時間</p>
            <strong id="timeLabel">45</strong>
          </div>
        </div>

        <div class="status-strip" id="statusStrip">準備好了嗎？選擇設定後開始遊戲。</div>

        <div class="ocean-board" id="gameBoard" aria-label="打地鼠遊戲區"></div>

        <div class="controls">
          <button class="primary" id="startGameBtn">開始遊戲</button>
          <button class="ghost" id="leaveRoomBtn" hidden>離開房間</button>
        </div>
      </section>

      <aside class="leaderboard card">
        <div class="tabs" role="tablist" aria-label="排行榜切換">
          <button class="tab active" data-tab="room" type="button">房間榜</button>
          <button class="tab" data-tab="local" type="button">本機榜</button>
        </div>
        <ol id="roomLeaderboard" class="score-list"></ol>
        <ol id="localLeaderboard" class="score-list" hidden></ol>
      </aside>
    </section>
  </main>

  <template id="holeTemplate">
    <button class="hole" type="button" aria-label="地鼠洞">
      <span class="splash"></span>
      <span class="mole">🐹</span>
      <span class="hit-pop">+1</span>
    </button>
  </template>

  <dialog id="resultDialog" class="result-dialog">
    <h2>遊戲結束</h2>
    <p id="resultText">你的分數是 0</p>
    <button id="closeResultBtn" class="primary">知道了</button>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
